<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Module Selector</title>
    <link href="../app.css" rel="stylesheet" />
    <script src="../app.js" defer></script>
    <script src="../subsystems.js" defer></script>
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
</head>
<body class="bg-surface-container-low min-h-screen text-on-surface font-body">
    <main class="module-selector-page">
        <div class="container module-selector-shell">
            <div class="module-selector-header">
                <div>
                    <p class="eyebrow">ISMERS Module Selector</p>
                    <h1 class="module-selector-title">Select a Subsystem Dashboard</h1>
                    <p class="module-selector-copy">Browse each ISMERS subsystem, open its dashboard, and review only the modules that belong to the selected hub.</p>
                </div>
                <div class="module-selector-actions">
                    <a href="../index.html" class="btn btn-view">Back to UI Hubs</a>
                </div>
            </div>

            <section class="module-selector-grid" id="module-selector-grid"></section>

        </div>
    </main>
</body>
</html>
